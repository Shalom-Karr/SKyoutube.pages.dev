<!DOCTYPE html>
<html lang="en" data-theme="dark"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#16152B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Stream music from whitelisted artists - A modern PWA music player">
    <title>SK Music</title>
    <link rel="icon" type="image/x-icon" href="https://zemer.io/favicon.ico">
    <link rel="manifest" href="/music/manifest.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.youtube.com/iframe_api"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-text">SK Music</span>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-page="0">
          <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path></svg>
          <span>Home</span>
        </button>
        <button class="nav-item" data-page="1">
            <svg viewBox="0 0 24 24"><path d="M12 5.9c1.16 0 2.1.94 2.1 2.1s-.94 2.1-2.1 2.1S9.9 9.16 9.9 8s.94-2.1 2.1-2.1m0 9c2.97 0 6.1 1.46 6.1 2.1v1.1H5.9V17c0-.64 3.13-2.1 6.1-2.1M12 4C9.79 4 8 5.79 8 8s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm0 9c-2.67 0-8 1.34-8 4v3h16v-3c0-2.66-5.33-4-8-4z"></path></svg>
          <span>Artists</span>
        </button>
        <button class="nav-item" data-page="2">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 10-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1114 9.5 4.5 4.5 0 019.5 14z"></path></svg>
          <span>Search</span>
        </button>
        <button class="nav-item" data-page="3">
            <svg viewBox="0 0 24 24"><path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 5h-3v5.5c0 1.38-1.12 2.5-2.5 2.5S10 13.88 10 12.5s1.12-2.5 2.5-2.5c.57 0 1.08.19 1.5.51V5h4v2zM4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6z"></path></svg>
          <span>Library</span>
        </button>
      </nav>
    </aside>

    <div class="main-container">
      <header id="header" class="glass-panel">
        <h1 id="pageTitle">Home</h1>
        <div class="header-actions">
            <div id="searchContainer" class="search-container">
                <input type="text" id="searchInput" placeholder="Search for songs...">
                <button id="searchButton" class="btn">Search</button>
            </div>
            <button id="shuffleAllBtn" class="btn">Shuffle All</button>
            <button id="settingsBtn" class="icon-btn">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61-.25-1.17-.59-1.69-.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69-.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
            </button>
        </div>
      </header>

      <main id="main">
        <section id="homePage" class="page active"><div id="homeContent"></div></section>
        <section id="artistsPage" class="page"><div id="artistsContent"></div></section>
        <section id="searchPage" class="page"><div id="searchContent"></div></section>
        <section id="libraryPage" class="page"><div id="libraryContent"></div></section>
      </main>

      <div id="settingsPanel" class="glass-panel settings-panel">
        <h2>Settings</h2>
        <div class="setting-item">
            <label for="spinToggle">Spinning Album Art</label>
            <input type="checkbox" id="spinToggle" class="toggle-switch">
        </div>
      </div>

      <div id="miniPlayer" class="mini-player glass-panel">
        <div class="mini-content">
          <div id="miniThumb" class="mini-thumb"></div>
          <div class="mini-info">
            <div id="miniTitle" class="mini-title">No song playing</div>
            <div id="miniArtist" class="mini-artist"></div>
          </div>
          <button id="miniPlayBtn" class="play-btn" aria-label="Play/Pause"></button>
        </div>
      </div>
    </div>

    <div id="playerSheet" class="player-sheet">
        <div id="playerBackground" class="player-background"></div>
        <div class="player-container">
            <div class="player-header">
                <button id="closePlayerBtn" class="icon-btn" aria-label="Close">
                    <svg viewBox="0 0 24 24"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>
            </div>
            <div class="player-artwork">
                <div id="artwork" class="artwork"></div>
            </div>
            <div class="player-info">
                <h2 id="trackTitle" class="track-title">No song playing</h2>
                <p id="trackArtist" class="track-artist"></p>
            </div>
            <div class="player-progress">
                <div id="slider" class="progress-bar"><div id="sliderFill" class="progress-fill"></div></div>
                <div class="progress-time">
                    <span id="currentTime">0:00</span>
                    <span id="totalTime">0:00</span>
                </div>
            </div>
            <div class="player-controls">
                <button id="shuffleBtn" class="icon-btn control-btn" aria-label="Shuffle"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"></path></svg></button>
                <button id="prevBtn" class="icon-btn control-btn" aria-label="Previous"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M6 6h2v12H6zm3.5 6l8.5 6V6z"></path></svg></button>
                <button id="playBtn" class="play-btn main-play" aria-label="Play/Pause"></button>
                <button id="nextBtn" class="icon-btn control-btn" aria-label="Next"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"></path></svg></button>
                <button id="repeatBtn" class="icon-btn control-btn" aria-label="Repeat"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"></path></svg></button>
            </div>
            <div class="up-next-container">
                <h3>Up Next</h3>
                <div id="upNextList"></div>
            </div>
        </div>
    </div>

    <div id="yt-player" style="position: fixed; top: -9999px; left: -9999px;"></div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
