<html lang="en" data-theme="dark"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Stream music from whitelisted artists - A modern PWA music player">
  <title>SK Music</title>
  <link rel="icon" type="image/x-icon" href="https://zemer.io/favicon.ico">
  <link rel="manifest" href="/music/manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <script type="text/javascript" id="www-widgetapi-script" src="https://www.youtube.com/s/player/217a23a9/www-widgetapi.vflset/www-widgetapi.js" async=""></script><script src="https://www.youtube.com/iframe_api"></script>
  <link rel="stylesheet" href="/music/css/style.css">
<body>
  <!-- Loading Screen -->


  <div id="app">
    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">
          <img src="https://zemer.io/favicon.ico" alt="SK Music" width="24" height="24">
        </div>
        <span class="logo-text">SK Music</span>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-page="0">
          <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path></svg>
          <span>Home</span>
        </button>
        <button class="nav-item" data-page="1">
          <svg viewBox="0 0 24 24"><path d="M12 5.9c1.16 0 2.1.94 2.1 2.1s-.94 2.1-2.1 2.1S9.9 9.16 9.9 8s.94-2.1 2.1-2.1m0 9c2.97 0 6.1 1.46 6.1 2.1v1.1H5.9V17c0-.64 3.13-2.1 6.1-2.1M12 4C9.79 4 8 5.79 8 8s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm0 9c-2.67 0-8 1.34-8 4v3h16v-3c0-2.66-5.33-4-8-4z"></path></svg>
          <span>Artists</span>
        </button>
        <button class="nav-item" data-page="2">
          <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 10-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1114 9.5 4.5 4.5 0 019.5 14z"></path></svg>
          <span>Search</span>
        </button>
        <button class="nav-item" data-page="3">
          <svg viewBox="0 0 24 24"><path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 5h-3v5.5c0 1.38-1.12 2.5-2.5 2.5S10 13.88 10 12.5s1.12-2.5 2.5-2.5c.57 0 1.08.19 1.5.51V5h4v2zM4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6z"></path></svg>
          <span>Library</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <!-- Now Playing Section -->
        <div id="sidebarNowPlaying" class="sidebar-now-playing">
          <div class="sidebar-track-info">
            <div id="sidebarTrackThumb" class="sidebar-track-thumb">
              <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"></path></svg>
            </div>
            <div class="sidebar-track-text">
              <div id="sidebarTrackTitle" class="sidebar-track-title">No song playing</div>
              <div id="sidebarTrackArtist" class="sidebar-track-artist">-</div>
            </div>
          </div>
          <div class="sidebar-controls">
            <button id="sidebarPrevBtn" class="sidebar-control-btn" aria-label="Previous">
              <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"></path></svg>
            </button>
            <button id="sidebarPlayBtn" class="sidebar-play-btn play-btn" aria-label="Play/Pause">
              <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
            </button>
            <button id="sidebarNextBtn" class="sidebar-control-btn" aria-label="Next">
              <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"></path></svg>
            </button>
          </div>
        </div>

        <button id="queueBtn" class="nav-item">
          <svg viewBox="0 0 24 24"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"></path></svg>
          <span>Queue</span>
        </button>
      </div>
    </aside>

    <!-- Main Container -->
    <div class="main-container">
      <!-- Header -->
      <header id="header">
        <h1 id="pageTitle">Home</h1>
        <div class="header-actions">
          <button id="sidebarToggle" class="icon-btn mobile-only" aria-label="Menu">
            <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"></path></svg>
          </button>
        </div>
      </header>

      <!-- Main Content -->
      <main id="main">
      <!-- Home Page -->
      <section id="homePage" class="page active">
        <div id="homeContent"></div>
      </section>

      <!-- Artists Page -->
      <section id="artistsPage" class="page">
        <div class="search-container">
          <div class="search-box">
            <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 10-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1114 9.5 4.5 4.5 0 019.5 14z"></path></svg>
            <input type="text" id="artistFilterInput" placeholder="Filter artists..." autocomplete="off">
            <button id="artistFilterClear" class="clear-btn hidden">
              <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"></path></svg>
            </button>
          </div>
        </div>
        <div id="artistsContent"></div>
      </section>

      <!-- Search Page -->
      <section id="searchPage" class="page">
        <div class="search-container">
          <div class="search-box">
            <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 10-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1114 9.5 4.5 4.5 0 019.5 14z"></path></svg>
            <input type="text" id="searchInput" placeholder="Search songs, artists..." autocomplete="off">
            <button id="searchClear" class="clear-btn hidden">
              <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"></path></svg>
            </button>
          </div>
          <button id="searchButton" class="btn btn-primary">Search</button>
        </div>
        <div id="searchContent"></div>
      </section>

      <!-- Library Page -->
      <section id="libraryPage" class="page">
        <div id="libraryContent"></div>
      </section>
    </main>

      <!-- Mini Player -->
      <div id="miniPlayer" class="mini-player">
        <div class="mini-progress">
          <div id="miniProgress" class="mini-progress-bar"></div>
        </div>
        <div class="mini-content">
          <div id="miniThumb" class="mini-thumb">
            <div class="placeholder-thumb">
              <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"></path></svg>
            </div>
          </div>
          <div class="mini-info">
            <div id="miniTitle" class="mini-title">No song playing</div>
            <div id="miniArtist" class="mini-artist">Select a song to play</div>
          </div>
          <button id="miniPlayBtn" class="play-btn" aria-label="Play/Pause">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
          </button>
        </div>
      </div>
    </div> <!-- End main-container -->

    <!-- Full Player -->
    <div id="playerSheet" class="player-sheet">
      <div class="player-container">
        <div class="player-header">
          <button id="closePlayerBtn" class="icon-btn" aria-label="Close">
            <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"></path></svg>
          </button>
          <span class="player-header-title">Now Playing</span>
          <div style="width: 48px;"></div>
        </div>

        <div class="player-artwork">
          <div id="artwork" class="artwork">
            <div class="placeholder-artwork">
              <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"></path></svg>
            </div>
          </div>
        </div>

        <div class="player-info">
          <h2 id="trackTitle" class="track-title">No song playing</h2>
          <p id="trackArtist" class="track-artist">Select a song to play</p>
        </div>

        <div class="player-progress">
          <div id="slider" class="progress-bar">
            <div id="sliderFill" class="progress-fill"></div>
          </div>
          <div class="progress-time">
            <span id="currentTime">0:00</span>
            <span id="totalTime">0:00</span>
          </div>
        </div>

        <div class="player-controls">
          <button id="shuffleBtn" class="icon-btn control-btn" aria-label="Shuffle">
            <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"></path></svg>
          </button>
          <button id="prevBtn" class="icon-btn control-btn" aria-label="Previous">
            <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"></path></svg>
          </button>
          <button id="playBtn" class="play-btn main-play" aria-label="Play/Pause">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
          </button>
          <button id="nextBtn" class="icon-btn control-btn" aria-label="Next">
            <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"></path></svg>
          </button>
          <button id="repeatBtn" class="icon-btn control-btn" aria-label="Repeat">
            <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"></path></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Artist/Album Detail Overlay -->
    <div id="artistOverlay" class="detail-overlay">
      <div id="artistDetail" class="detail-panel">
        <!-- Content populated by JavaScript -->
      </div>
    </div>

    <!-- Queue Drawer -->
    <div id="queueOverlay" class="queue-overlay">
      <div id="queueDrawer" class="queue-drawer">
        <div class="queue-header">
          <h2 class="queue-title">Queue</h2>
          <button id="queueClose" class="icon-btn" aria-label="Close queue">
            <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"></path></svg>
          </button>
        </div>
        <div class="queue-actions">
          <button id="clearQueueBtn" class="btn btn-secondary">Clear Queue</button>
          <button id="saveQueueBtn" class="btn btn-primary">Save as Playlist</button>
        </div>
        <div id="queueList" class="queue-list"></div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Hidden YouTube Player -->
    <div id="yt-player" aria-hidden="true"></div>
  </div>
<script src="https://www.youtube.com/iframe_api"></script>
<script type="module" src="/music/js/tracking.js"></script>
<script type="module" src="/music/js/app.js"></script>
</body>
</html>
